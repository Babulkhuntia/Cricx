<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Match Scorecard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🏏 Cricbuzz Live Scorecard</h1>
<a href="index.html">← Back to Matches</a>
</header>


<div class="scorecard-container">

<!-- MATCH INFO -->
<div class="match-info">
<h2 id="matchTitle"></h2>
<p id="matchStatus">Match in progress</p>
</div>


<!-- FIRST INNINGS -->
<div class="innings">

<h2 id="team1Name">Team 1</h2>
<h3 id="team1Score">0/0 (0.0)</h3>

<h4>Batting</h4>

<table>
<thead>
<tr>
<th>Batsman</th>
<th>R</th>
<th>B</th>
<th>4s</th>
<th>6s</th>
<th>SR</th>
</tr>
</thead>

<tbody id="team1Batting">
<tr>
<td>Player 1</td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
</tr>
</tbody>
</table>


<h4>Bowling</h4>

<table>
<thead>
<tr>
<th>Bowler</th>
<th>O</th>
<th>R</th>
<th>W</th>
<th>Econ</th>
</tr>
</thead>

<tbody id="team2Bowling">
<tr>
<td>Bowler 1</td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
</tr>
</tbody>
</table>

</div>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Match - Gully Cricket Live</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<header>

<nav class="navbar">

<div class="nav-brand">
<i class="fas fa-baseball-ball"></i>
<span>Gully Cricket Live</span>
</div>

<div class="nav-links">

<a href="index.html">Home</a>

</div>

</nav>

</header>

<main>

<div class="container">

<h2><i class="fas fa-plus"></i> Add New Match</h2>

<form id="matchForm" class="match-form">

<div class="form-group">
<label>Team 1 Name</label>
<input type="text" id="team1" required>
</div>

<div class="form-group">
<label>Team 2 Name</label>
<input type="text" id="team2" required>
</div>

<div class="form-group">
<label>Match Date</label>
<input type="date" id="matchDate" required>
</div>

<div class="form-group">
<label>Match Status</label>

<select id="matchStatus">

<option value="live">Live</option>

<option value="upcoming">Upcoming</option>

</select>

</div>

<button type="submit" class="btn-primary">

<i class="fas fa-plus"></i> Add Match

</button>

</form>

</div>

</main>

<script src="matches.js" defer></script>

</body>

</html>

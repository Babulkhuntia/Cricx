<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Match - Gully Cricket Live</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="add-match-container">
            <div class="back-btn">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
            <div class="add-match-card">
                <h2><i class="fas fa-plus-circle"></i> Add New Match</h2>
                <form id="addMatchForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="team1">Team 1</label>
                            <input type="text" id="team1" required>
                        </div>
                        <div class="form-group">
                            <label for="team2">Team 2</label>
                            <input type="text" id="team2" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="location">Location</label>
                            <input type="text" id="location" placeholder="e.g., Local Ground, Mumbai" required>
                        </div>
                        <div class="form-group">
                            <label for="matchDate">Date</label>
                            <input type="date" id="matchDate" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="matchTime">Time</label>
                            <input type="time" id="matchTime" required>
                        </div>
                        <div class="form-group">
                            <label for="matchType">Match Type</label>
                            <select id="matchType" required>
                                <option value="">Select Type</option>
                                <option value="live">Live Match</option>
                                <option value="upcoming">Upcoming Match</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary full-width">
                        <i class="fas fa-cricket"></i> Add Match
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script src="matches.js"></script>
</body>
</html>
